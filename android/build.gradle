def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    compileSdkVersion 36
    namespace "com.chalces.llamafu"
    ndkVersion "29.0.13599879"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // llama.cpp 의 llama-mmap.cpp 가 posix_madvise (Android API 23+) 를 사용하므로 21 → 28 로 상향.
        // 상위 앱(autobio)이 minSdk 28 이므로 정합성 유지.
        minSdkVersion 28
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // armeabi-v7a (32-bit ARM) 제외 — sgemm.cpp 의 FP16 NEON (vld1q_f16) 미지원.
        // 3B LLM 은 32-bit ARM 에서 비실용적이므로 드롭이 타당.
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }

        externalNativeBuild {
            cmake {
                def llamaCppDir = System.getenv("LLAMA_CPP_DIR") ?: project.findProperty("llama.cpp.dir") ?: "${projectDir}/../llama.cpp"
                arguments "-DLLAMA_CPP_DIR=${llamaCppDir}"

                // Optimize build for release
                cppFlags "-O3", "-DNDEBUG"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            // 3.18.1 은 ggml-vulkan (cmake_minimum_required 3.19+) 미지원.
            // Android SDK Manager 에 3.22.1 미리 설치되어 있어야 함.
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}